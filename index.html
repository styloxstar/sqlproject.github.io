<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER Diagram - Database Schema</title>
<style>
/* ===== CSS Variables for Theming ===== */
:root {
  --transition-speed: 0.35s;
}

[data-theme="dark"] {
  --bg-main: #002141;
  --bg-secondary: #264061;
  --bg-card: rgba(22, 22, 60, 0.65);
  --bg-card-hover: rgba(30, 56, 80, 0.75);
  --bg-card-active: rgba(0, 36, 83, 0.85);
  --bg-glass: rgba(32, 57, 110, 0.55);
  --bg-glass-strong: rgba(2, 40, 99, 0.75);
  --bg-input: rgba(21, 50, 104, 0.6);
  --bg-table-header: rgba(3, 37, 100, 0.8);
  --bg-table-row-hover: rgba(109, 139, 187, 0.06);
  --bg-diagram: rgba(0, 0, 87, 0.7);
  --border-main: rgba(80, 80, 160, 0.3);
  --border-card: rgba(80, 80, 160, 0.25);
  --border-active: rgba(63, 89, 129, 0.6);
  --border-input: rgba(68, 121, 182, 0.3);
  --text-primary: #e8e8f0;
  --text-secondary: #ffffff;
  --text-muted: #ffffff;
  --text-accent: #9dc2fd;
  --text-accent2: #a78bfa;
  --glow-accent: rgba(138, 180, 248, 0.15);
  --glow-accent2: rgba(167, 139, 250, 0.12);
  --gradient-header: linear-gradient(135deg, #12123a 0%, #1e1e5a 50%, #2a1a5a 100%);
  --gradient-orb1: radial-gradient(circle, rgba(138,180,248,0.08) 0%, transparent 70%);
  --gradient-orb2: radial-gradient(circle, rgba(167,139,250,0.06) 0%, transparent 70%);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-glow: 0 0 30px rgba(138,180,248,0.08);
  --scrollbar-thumb: rgba(100,100,180,0.3);
  --scrollbar-track: transparent;
  --svg-center-fill: rgba(30,30,80,0.8);
  --svg-center-stroke: #8ab4f8;
  --svg-node-fill: rgba(88, 60, 102, 0.85);
  --svg-text-muted: #555577;
  --svg-legend-explicit: #4ade80;
  --svg-legend-implied: #fb923c;
}

[data-theme="light"] {
  --bg-main: #f0f2f8;
  --bg-secondary: #e8eaf2;
  --bg-card: rgba(255, 255, 255, 0.7);
  --bg-card-hover: rgba(255, 255, 255, 0.85);
  --bg-card-active: rgba(240, 243, 255, 0.9);
  --bg-glass: rgba(255, 255, 255, 0.55);
  --bg-glass-strong: rgba(255, 255, 255, 0.75);
  --bg-input: rgba(255, 255, 255, 0.7);
  --bg-table-header: rgba(235, 240, 255, 0.9);
  --bg-table-row-hover: rgba(99, 130, 220, 0.06);
  --bg-diagram: rgba(245, 247, 255, 0.8);
  --border-main: rgba(180, 185, 210, 0.4);
  --border-card: rgba(180, 185, 210, 0.3);
  --border-active: rgba(79, 109, 205, 0.6);
  --border-input: rgba(180, 185, 210, 0.4);
  --text-primary: #1a1a2e;
  --text-secondary: #555577;
  --text-muted: #8888aa;
  --text-accent: #4361ee;
  --text-accent2: #7c3aed;
  --glow-accent: rgba(67, 97, 238, 0.1);
  --glow-accent2: rgba(124, 58, 237, 0.08);
  --gradient-header: linear-gradient(135deg, #e8ecf8 0%, #dde3f5 50%, #e5ddf5 100%);
  --gradient-orb1: radial-gradient(circle, rgba(67,97,238,0.06) 0%, transparent 70%);
  --gradient-orb2: radial-gradient(circle, rgba(124,58,237,0.04) 0%, transparent 70%);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-glow: 0 0 30px rgba(67,97,238,0.06);
  --scrollbar-thumb: rgba(150,155,180,0.35);
  --scrollbar-track: transparent;
  --svg-center-fill: rgba(235,240,255,0.9);
  --svg-center-stroke: #4361ee;
  --svg-node-fill: rgba(255,255,255,0.9);
  --svg-text-muted: #8888aa;
  --svg-legend-explicit: #16a34a;
  --svg-legend-implied: #ea580c;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  transition: background var(--transition-speed), color var(--transition-speed);
  overflow: hidden;
  height: 100vh;
}

/* Animated background orbs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: floatOrb 20s ease-in-out infinite;
}
body::before {
  width: 600px; height: 600px;
  top: -100px; right: -100px;
  background: var(--gradient-orb1);
}
body::after {
  width: 500px; height: 500px;
  bottom: -80px; left: -80px;
  background: var(--gradient-orb2);
  animation-delay: -10s;
  animation-direction: reverse;
}

@keyframes floatOrb {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -40px) scale(1.05); }
  50% { transform: translate(-20px, 20px) scale(0.95); }
  75% { transform: translate(15px, 30px) scale(1.02); }
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 var(--glow-accent); }
  50% { box-shadow: 0 0 16px 2px var(--glow-accent); }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-15px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Header ===== */
.header {
  position: relative;
  z-index: 10;
  background: var(--gradient-header);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-main);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  gap: 24px;
  animation: fadeIn 0.6s ease;
}
.header-left h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-accent);
  letter-spacing: -0.3px;
}
.header-left p {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
}

.stats {
  display: flex;
  gap: 10px;
  margin-left: auto;
  flex-wrap: wrap;
}
.stat {
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-card);
  padding: 7px 14px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--text-secondary);
  transition: all var(--transition-speed);
  animation: fadeSlideIn 0.5s ease backwards;
}
.stat:nth-child(1) { animation-delay: 0.1s; }
.stat:nth-child(2) { animation-delay: 0.15s; }
.stat:nth-child(3) { animation-delay: 0.2s; }
.stat:nth-child(4) { animation-delay: 0.25s; }
.stat:nth-child(5) { animation-delay: 0.3s; }
.stat b {
  color: var(--text-accent);
  font-size: 15px;
  font-weight: 700;
  margin-right: 4px;
}

/* Theme toggle */
.theme-toggle {
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-card);
  border-radius: 12px;
  padding: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all var(--transition-speed);
  flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--border-active); }
.theme-toggle .toggle-option {
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 13px;
  transition: all 0.25s;
  user-select: none;
  line-height: 1;
}
.theme-toggle .toggle-option.active {
  background: var(--text-accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* ===== Controls Bar ===== */
.controls {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 28px;
  background: var(--bg-glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-main);
  flex-wrap: wrap;
  animation: fadeIn 0.5s ease 0.15s backwards;
}
.controls label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
  font-weight: 600;
}
.controls input, .controls select {
  background: var(--bg-input);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border-input);
  color: var(--text-primary);
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 13px;
  outline: none;
  transition: all 0.25s;
}
.controls input { width: 240px; }
.controls select { min-width: 140px; cursor: pointer; }
.controls input:focus, .controls select:focus {
  border-color: var(--border-active);
  box-shadow: 0 0 0 3px var(--glow-accent);
}
.controls input::placeholder { color: var(--text-muted); }
#filterStatus {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-muted);
  background: var(--bg-glass);
  padding: 4px 12px;
  border-radius: 8px;
  border: 1px solid var(--border-card);
}

/* ===== Layout ===== */
.container {
  display: flex;
  height: calc(100vh - 110px);
  position: relative;
  z-index: 1;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 300px;
  min-width: 300px;
  overflow-y: auto;
  padding: 10px;
  background: var(--bg-glass);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-right: 1px solid var(--border-main);
  transition: background var(--transition-speed);
}

.table-card {
  background: var(--bg-card);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--border-card);
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  animation: slideInLeft 0.3s ease backwards;
  overflow: hidden;
}
.table-card:hover {
  border-color: var(--border-active);
  background: var(--bg-card-hover);
  transform: translateX(3px);
  box-shadow: var(--shadow-glow);
}
.table-card.active {
  border-color: var(--border-active);
  background: var(--bg-card-active);
  box-shadow: var(--shadow-glow);
  animation: pulseGlow 2s ease-in-out infinite;
}
.table-card.hidden { display: none; }

.table-card .name {
  padding: 8px 12px 4px;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.table-card .info {
  padding: 2px 12px 7px;
  font-size: 11px;
  color: var(--text-muted);
}

/* ===== Main Panel ===== */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  transition: background var(--transition-speed);
}

.detail-panel {
  background: var(--bg-glass-strong);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-card);
  border-radius: 16px;
  padding: 24px;
  box-shadow: var(--shadow-card);
  animation: fadeSlideIn 0.4s ease;
}
.detail-panel h2 {
  color: var(--text-accent);
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.detail-meta {
  color: var(--text-secondary);
  font-size: 13px;
  margin: 6px 0 18px;
  line-height: 1.6;
}

/* ===== Badges ===== */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  white-space: nowrap;
  transition: all 0.2s;
}
.badge.pk-badge { background: rgba(250,204,21,0.15); color: #facc15; border: 1px solid rgba(250,204,21,0.2); }
.badge.fk-badge { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.2); }
.badge.idx-badge { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.2); }
.badge.src-agent { background: rgba(244,63,94,0.12); color: #fb7185; border: 1px solid rgba(244,63,94,0.15); }
.badge.src-vision { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.15); }
.badge.src-both { background: rgba(251,146,60,0.12); color: #fb923c; border: 1px solid rgba(251,146,60,0.15); }

[data-theme="light"] .badge.pk-badge { background: rgba(202,138,4,0.12); color: #a16207; border-color: rgba(202,138,4,0.2); }
[data-theme="light"] .badge.fk-badge { background: rgba(37,99,235,0.1); color: #2563eb; border-color: rgba(37,99,235,0.15); }
[data-theme="light"] .badge.idx-badge { background: rgba(124,58,237,0.1); color: #7c3aed; border-color: rgba(124,58,237,0.15); }
[data-theme="light"] .badge.src-agent { background: rgba(225,29,72,0.08); color: #be123c; border-color: rgba(225,29,72,0.12); }
[data-theme="light"] .badge.src-vision { background: rgba(22,163,74,0.08); color: #15803d; border-color: rgba(22,163,74,0.12); }
[data-theme="light"] .badge.src-both { background: rgba(234,88,12,0.08); color: #c2410c; border-color: rgba(234,88,12,0.12); }

.pk { color: #facc15; }
.fk { color: #60a5fa; }
[data-theme="light"] .pk { color: #a16207; }
[data-theme="light"] .fk { color: #2563eb; }

/* ===== Tabs ===== */
.tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 18px;
  border-bottom: 2px solid var(--border-card);
  position: relative;
}
.tab {
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.25s;
  user-select: none;
  position: relative;
}
.tab:hover { color: var(--text-secondary); }
.tab.active {
  color: var(--text-accent);
  border-bottom-color: var(--text-accent);
}
.tab .tab-count {
  font-size: 10px;
  background: var(--glow-accent);
  color: var(--text-accent);
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 5px;
  font-weight: 700;
}
.tab-content { display: none; animation: fadeSlideIn 0.35s ease; }
.tab-content.active { display: block; }

/* ===== Section headers ===== */
.section { margin-bottom: 22px; }
.section h3 {
  color: var(--text-accent2);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-card);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section h3 .count {
  background: var(--glow-accent2);
  color: var(--text-accent2);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
}

/* ===== Data Table ===== */
.data-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 12px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border-card);
}
.data-table th {
  background: var(--bg-table-header);
  color: var(--text-accent);
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  position: sticky;
  top: 0;
  z-index: 2;
}
.data-table td {
  padding: 8px 12px;
  border-top: 1px solid var(--border-card);
  transition: background 0.15s;
}
.data-table tr:hover td { background: var(--bg-table-row-hover); }

/* ===== Relationship Cards ===== */
.rel-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-glass);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border-card);
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  animation: slideInLeft 0.3s ease backwards;
}
.rel-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-active);
  transform: translateX(4px);
}
.rel-card .arrow { color: var(--text-accent); font-size: 14px; flex-shrink: 0; font-weight: 700; letter-spacing: -1px; }
.rel-card .meta { color: var(--text-muted); font-size: 11px; margin-left: auto; font-style: italic; }
.rel-card.implied { border-left: 3px solid rgba(251,146,60,0.5); }
.rel-card.explicit { border-left: 3px solid rgba(74,222,128,0.5); }
[data-theme="light"] .rel-card.implied { border-left-color: rgba(234,88,12,0.4); }
[data-theme="light"] .rel-card.explicit { border-left-color: rgba(22,163,74,0.4); }

/* ===== Network Diagram ===== */
.network-canvas {
  width: 100%;
  height: 400px;
  background: var(--bg-diagram);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 14px;
  border: 1px solid var(--border-card);
  position: relative;
  overflow: hidden;
}

.empty-msg { color: var(--text-muted); font-style: italic; padding: 16px 0; font-size: 13px; }

/* Placeholder state */
.placeholder-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  text-align: center;
  animation: fadeIn 0.6s ease;
}
.placeholder-panel .icon {
  font-size: 56px;
  margin-bottom: 16px;
  opacity: 0.3;
}
.placeholder-panel h2 {
  color: var(--text-accent);
  font-size: 20px;
  margin-bottom: 8px;
}
.placeholder-panel p {
  color: var(--text-muted);
  font-size: 14px;
  max-width: 360px;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>ER Schema Explorer</h1>
    <p>saas_gfs_agent_vision_stg.sql & saas_gfs_vision_stg.sql</p>
  </div>
  <div class="stats">
    <div class="stat"><b id="stTables">0</b> Tables</div>
    <div class="stat"><b id="stCols">0</b> Columns</div>
    <div class="stat"><b id="stFKs">0</b> Foreign Keys</div>
    <div class="stat"><b id="stImplied">0</b> Implied</div>
    <div class="stat"><b id="stIndexes">0</b> Indexes</div>
  </div>
  <div class="theme-toggle" onclick="toggleTheme()">
    <span class="toggle-option" id="togDark" title="Dark mode">&#9790;</span>
    <span class="toggle-option" id="togLight" title="Light mode">&#9788;</span>
  </div>
</div>

<div class="controls">
  <label>Search</label>
  <input type="text" id="search" placeholder="Filter tables..." oninput="applyFilters()">
  <label>Source</label>
  <select id="srcFilter" onchange="applyFilters()">
    <option value="all">All Sources</option>
    <option value="agent">Agent Vision</option>
    <option value="vision">Vision STG</option>
    <option value="both">Both Files</option>
  </select>
  <label>Show</label>
  <select id="relFilter" onchange="applyFilters()">
    <option value="all">All Tables</option>
    <option value="has_fk">Has Foreign Keys</option>
    <option value="has_implied">Has Implied Rels</option>
    <option value="is_referenced">Is Referenced</option>
    <option value="has_indexes">Has Indexes</option>
    <option value="no_rels">Isolated</option>
  </select>
  <span id="filterStatus"></span>
</div>

<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main">
    <div class="placeholder-panel">
      <div class="icon">&#9881;</div>
      <h2>Select a Table</h2>
      <p>Choose any table from the sidebar to explore its columns, relationships, indexes, and visual connection diagram.</p>
    </div>
  </div>

// Pre-compute
const allTableNames = Object.keys(ALL_TABLES).sort();
const referencedByExplicit = new Set();
const referencedByImplied = new Set();
EXPLICIT_RELS.forEach(r => referencedByExplicit.add(r.to));
IMPLIED_RELS.forEach(r => referencedByImplied.add(r.to));

const tablesWithFK = new Set();
Object.entries(ALL_TABLES).forEach(([n, t]) => {
  if (t.foreign_keys && t.foreign_keys.length > 0) tablesWithFK.add(n);
});

const tablesWithImplied = new Set();
IMPLIED_RELS.forEach(r => { tablesWithImplied.add(r.from); tablesWithImplied.add(r.to); });
EXPLICIT_RELS.forEach(r => { tablesWithImplied.add(r.from); });

const tablesReferenced = new Set([...referencedByExplicit, ...referencedByImplied]);

const tablesWithIndexes = new Set();
Object.entries(ALL_TABLES).forEach(([n, t]) => {
  if ((t.indexes && t.indexes.length) || (t.unique_keys && t.unique_keys.length)) tablesWithIndexes.add(n);
});

const isolatedTables = new Set(allTableNames.filter(t =>
  !tablesWithFK.has(t) && !tablesReferenced.has(t) && !tablesWithImplied.has(t)
));

// Stats
document.getElementById('stTables').textContent = allTableNames.length;
document.getElementById('stCols').textContent = Object.values(ALL_TABLES).reduce((s, t) => s + (t.columns ? t.columns.length : 0), 0);
document.getElementById('stFKs').textContent = EXPLICIT_RELS.length;
document.getElementById('stImplied').textContent = IMPLIED_RELS.length;
document.getElementById('stIndexes').textContent = Object.values(ALL_TABLES).reduce((s, t) => s + (t.indexes ? t.indexes.length : 0) + (t.unique_keys ? t.unique_keys.length : 0), 0);

// Theme
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  updateToggleUI(next);
  try { localStorage.setItem('er-theme', next); } catch(e) {}
  // Redraw diagram if visible
  const dc = document.getElementById('tabDiagram');
  if (dc && dc.classList.contains('active')) {
    const h2 = document.querySelector('.detail-panel h2');
    if (h2) drawDiagram(h2.textContent.trim().split(' ')[0]);
  }
}
function updateToggleUI(theme) {
  document.getElementById('togDark').classList.toggle('active', theme === 'dark');
  document.getElementById('togLight').classList.toggle('active', theme === 'light');
}
(function() {
  try {
    const saved = localStorage.getItem('er-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  } catch(e) {}
  updateToggleUI(document.documentElement.getAttribute('data-theme') || 'dark');
})();

// Source badge
function srcBadge(tname) {
  const s = SOURCE_MAP[tname] || '';
  if (s === 'both') return '<span class="badge src-both">BOTH</span>';
  if (s === 'agent') return '<span class="badge src-agent">AGENT</span>';
  return '<span class="badge src-vision">VISION</span>';
}

// Build sidebar
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = allTableNames.map((t, i) => {
    const info = ALL_TABLES[t];
    const cc = info.columns ? info.columns.length : 0;
    const fc = info.foreign_keys ? info.foreign_keys.length : 0;
    const ic = (info.indexes ? info.indexes.length : 0) + (info.unique_keys ? info.unique_keys.length : 0);
    const isRef = tablesReferenced.has(t);
    const src = SOURCE_MAP[t] || 'vision';
    let tags = [];
    if (fc) tags.push(fc + ' FK');
    if (ic) tags.push(ic + ' idx');
    if (isRef) tags.push('ref\'d');
    return '<div class="table-card" id="card_' + t + '" data-name="' + t + '" data-src="' + src +
      '" style="animation-delay:' + Math.min(i * 8, 600) + 'ms" onclick="showTable(\'' + t + '\')">' +
      '<div class="name"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + t + '</span> ' + srcBadge(t) + '</div>' +
      '<div class="info">' + cc + ' cols' + (tags.length ? ' &middot; ' + tags.join(' &middot; ') : '') + '</div></div>';
  }).join('');
}
buildSidebar();

// Filters
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const src = document.getElementById('srcFilter').value;
  const rel = document.getElementById('relFilter').value;
  let shown = 0;
  allTableNames.forEach(t => {
    const card = document.getElementById('card_' + t);
    if (!card) return;
    let show = true;
    if (q && !t.toLowerCase().includes(q)) show = false;
    if (src !== 'all') {
      const ts = SOURCE_MAP[t] || 'vision';
      if (src !== ts) show = false;
    }
    if (rel === 'has_fk' && !tablesWithFK.has(t)) show = false;
    if (rel === 'has_implied' && !tablesWithImplied.has(t)) show = false;
    if (rel === 'is_referenced' && !tablesReferenced.has(t)) show = false;
    if (rel === 'has_indexes' && !tablesWithIndexes.has(t)) show = false;
    if (rel === 'no_rels' && !isolatedTables.has(t)) show = false;
    if (show) { card.classList.remove('hidden'); shown++; }
    else { card.classList.add('hidden'); }
  });
  document.getElementById('filterStatus').textContent = shown + ' / ' + allTableNames.length;
}
applyFilters();

// Show table
function showTable(tname) {
  document.querySelectorAll('.table-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card_' + tname);
  if (card) { card.classList.add('active'); card.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }

  const t = ALL_TABLES[tname];
  if (!t) return;

  const outgoing = EXPLICIT_RELS.filter(r => r.from === tname);
  const incoming = EXPLICIT_RELS.filter(r => r.to === tname);
  const impliedOut = IMPLIED_RELS.filter(r => r.from === tname);
  const impliedIn = IMPLIED_RELS.filter(r => r.to === tname);
  const totalRels = outgoing.length + incoming.length + impliedOut.length + impliedIn.length;
  const totalIdx = (t.indexes ? t.indexes.length : 0) + (t.unique_keys ? t.unique_keys.length : 0);

  let h = '<div class="detail-panel">';
  h += '<h2>' + tname + ' ' + srcBadge(tname) + '</h2>';
  h += '<div class="detail-meta">Source: <b>' + (SOURCE_MAP[tname] || 'vision') + '</b> &nbsp;|&nbsp; ' +
       (t.columns ? t.columns.length : 0) + ' columns &nbsp;|&nbsp; PK: <span class="pk">' +
       (t.primary_key && t.primary_key.length ? t.primary_key.join(', ') : 'None') +
       '</span> &nbsp;|&nbsp; ' + totalRels + ' relationships</div>';

  // Tabs
  h += '<div class="tab-bar">';
  h += '<div class="tab active" onclick="switchTab(this,\'tabCols\')">Columns <span class="tab-count">' + (t.columns ? t.columns.length : 0) + '</span></div>';
  h += '<div class="tab" onclick="switchTab(this,\'tabRels\')">Relationships <span class="tab-count">' + totalRels + '</span></div>';
  h += '<div class="tab" onclick="switchTab(this,\'tabIdx\')">Indexes <span class="tab-count">' + totalIdx + '</span></div>';
  h += '<div class="tab" onclick="switchTab(this,\'tabDiagram\')">Diagram</div>';
  h += '</div>';

  // === Columns Tab ===
  h += '<div class="tab-content active" id="tabCols">';
  h += '<table class="data-table"><tr><th>#</th><th>Column</th><th>Type</th><th>Nullable</th><th>Default</th><th>Auto</th><th>Key</th></tr>';
  const fkCols = new Set((t.foreign_keys || []).map(fk => fk.column));
  const idxCols = new Set();
  (t.indexes || []).forEach(idx => idx.columns.forEach(c => idxCols.add(c)));
  (t.unique_keys || []).forEach(uk => uk.columns.forEach(c => idxCols.add(c)));
  (t.columns || []).forEach((c, i) => {
    const isPK = t.primary_key && t.primary_key.includes(c.name);
    const isFK = fkCols.has(c.name);
    const isIdx = idxCols.has(c.name);
    let badges = '';
    if (isPK) badges += '<span class="badge pk-badge">PK</span> ';
    if (isFK) badges += '<span class="badge fk-badge">FK</span> ';
    if (isIdx && !isPK) badges += '<span class="badge idx-badge">IDX</span>';
    const cls = isPK ? ' class="pk"' : (isFK ? ' class="fk"' : '');
    h += '<tr><td>' + (i+1) + '</td><td' + cls + '>' + c.name + '</td><td>' + c.type + '</td><td>' + c.nullable + '</td><td>' + (c.default || '') + '</td><td>' + c.auto_increment + '</td><td>' + badges + '</td></tr>';
  });
  h += '</table></div>';

  // === Relationships Tab ===
  h += '<div class="tab-content" id="tabRels">';
  if (outgoing.length) {
    h += '<div class="section"><h3>Foreign Keys (outgoing) <span class="count">' + outgoing.length + '</span></h3>';
    outgoing.forEach((r, i) => {
      h += '<div class="rel-card explicit" style="animation-delay:' + (i*40) + 'ms" onclick="showTable(\'' + r.to + '\')">' +
           '<span class="fk">' + tname + '.' + r.from_col + '</span>' +
           '<span class="arrow">&rarr;</span>' +
           '<span class="pk">' + r.to + '.' + r.to_col + '</span>' +
           '<span class="meta">' + r.constraint + (r.on_delete ? ' ON DELETE ' + r.on_delete : '') + '</span></div>';
    });
    h += '</div>';
  }
  if (incoming.length) {
    h += '<div class="section"><h3>Referenced By (explicit) <span class="count">' + incoming.length + '</span></h3>';
    incoming.forEach((r, i) => {
      h += '<div class="rel-card explicit" style="animation-delay:' + (i*40) + 'ms" onclick="showTable(\'' + r.from + '\')">' +
           '<span class="fk">' + r.from + '.' + r.from_col + '</span>' +
           '<span class="arrow">&rarr;</span>' +
           '<span class="pk">' + tname + '.' + r.to_col + '</span>' +
           '<span class="meta">' + r.constraint + '</span></div>';
    });
    h += '</div>';
  }
  if (impliedOut.length) {
    h += '<div class="section"><h3>Implied References (outgoing) <span class="count">' + impliedOut.length + '</span></h3>';
    impliedOut.forEach((r, i) => {
      h += '<div class="rel-card implied" style="animation-delay:' + (i*40) + 'ms" onclick="showTable(\'' + r.to + '\')">' +
           '<span class="fk">' + tname + '.' + r.from_col + '</span>' +
           '<span class="arrow">&#8674;</span>' +
           '<span class="pk">' + r.to + '.' + r.to_col + '</span>' +
           '<span class="meta">implied</span></div>';
    });
    h += '</div>';
  }
  if (impliedIn.length) {
    h += '<div class="section"><h3>Implied Referenced By <span class="count">' + impliedIn.length + '</span></h3>';
    impliedIn.forEach((r, i) => {
      h += '<div class="rel-card implied" style="animation-delay:' + (i*40) + 'ms" onclick="showTable(\'' + r.from + '\')">' +
           '<span class="fk">' + r.from + '.' + r.from_col + '</span>' +
           '<span class="arrow">&#8674;</span>' +
           '<span class="pk">' + tname + '.' + r.to_col + '</span>' +
           '<span class="meta">implied</span></div>';
    });
    h += '</div>';
  }
  if (totalRels === 0) {
    h += '<p class="empty-msg">No relationships found for this table.</p>';
  }
  h += '</div>';

  // === Indexes Tab ===
  h += '<div class="tab-content" id="tabIdx">';
  if (totalIdx > 0) {
    h += '<table class="data-table"><tr><th>#</th><th>Name</th><th>Type</th><th>Columns</th></tr>';
    let n = 0;
    (t.unique_keys || []).forEach(uk => {
      n++;
      h += '<tr><td>' + n + '</td><td>' + uk.name + '</td><td><span class="badge pk-badge">UNIQUE</span></td><td>' + uk.columns.join(', ') + '</td></tr>';
    });
    (t.indexes || []).forEach(idx => {
      n++;
      h += '<tr><td>' + n + '</td><td>' + idx.name + '</td><td><span class="badge idx-badge">INDEX</span></td><td>' + idx.columns.join(', ') + '</td></tr>';
    });
    h += '</table>';
  } else {
    h += '<p class="empty-msg">No indexes defined for this table.</p>';
  }
  h += '</div>';

  // === Diagram Tab ===
  h += '<div class="tab-content" id="tabDiagram">';
  h += '<div class="network-canvas" id="netCanvas"></div>';
  h += '</div>';

  h += '</div>';
  document.getElementById('main').innerHTML = h;
  setTimeout(() => drawDiagram(tname), 60);
}

function switchTab(el, tabId) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  el.closest('.detail-panel').querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  const target = document.getElementById(tabId);
  if (target) target.classList.add('active');
  if (tabId === 'tabDiagram') {
    const tname = el.closest('.detail-panel').querySelector('h2').textContent.trim().split(' ')[0];
    setTimeout(() => drawDiagram(tname), 60);
  }
}

// SVG Diagram
function drawDiagram(center) {
  const canvas = document.getElementById('netCanvas');
  if (!canvas) return;
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  const connected = [];
  const addC = (tname, col, dir, type) => {
    if (tname !== center) connected.push({ name: tname, col: col, dir: dir, type: type });
  };
  EXPLICIT_RELS.forEach(r => {
    if (r.from === center) addC(r.to, r.from_col + ' \u2192 ' + r.to_col, 'out', 'explicit');
    if (r.to === center) addC(r.from, r.from_col + ' \u2192 ' + r.to_col, 'in', 'explicit');
  });
  IMPLIED_RELS.forEach(r => {
    if (r.from === center) addC(r.to, r.from_col + ' \u2192 ' + r.to_col, 'out', 'implied');
    if (r.to === center) addC(r.from, r.from_col + ' \u2192 ' + r.to_col, 'in', 'implied');
  });

  const seen = new Set();
  const unique = connected.filter(c => {
    const k = c.name + c.dir + c.type;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });

  const cs = getComputedStyle(document.documentElement);
  const centerFill = cs.getPropertyValue('--svg-center-fill').trim();
  const centerStroke = cs.getPropertyValue('--svg-center-stroke').trim();
  const nodeFill = cs.getPropertyValue('--svg-node-fill').trim();
  const textMuted = cs.getPropertyValue('--svg-text-muted').trim();
  const colorE = cs.getPropertyValue('--svg-legend-explicit').trim();
  const colorI = cs.getPropertyValue('--svg-legend-implied').trim();

  let svg = '<svg width="' + W + '" height="' + H + '" xmlns="http://www.w3.org/2000/svg" style="font-family:Inter,system-ui,sans-serif">';
  svg += '<defs>';
  svg += '<marker id="aE" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="' + colorE + '"/></marker>';
  svg += '<marker id="aI" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="' + colorI + '"/></marker>';
  svg += '<filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg += '</defs>';

  const cx = W / 2, cy = H / 2;
  const count = unique.length;

  // Center
  const cw = Math.max(center.length * 8.5 + 30, 140), ch = 40;
  svg += '<rect x="' + (cx - cw/2) + '" y="' + (cy - ch/2) + '" width="' + cw + '" height="' + ch + '" rx="10" fill="' + centerFill + '" stroke="' + centerStroke + '" stroke-width="2" filter="url(#glow)"/>';
  svg += '<text x="' + cx + '" y="' + (cy + 5) + '" text-anchor="middle" fill="' + centerStroke + '" font-size="13" font-weight="700">' + center + '</text>';

  if (count === 0) {
    svg += '<text x="' + cx + '" y="' + (cy + 55) + '" text-anchor="middle" fill="' + textMuted + '" font-size="13">No connections found</text>';
  } else {
    const radius = Math.min(W, H) * 0.36;
    unique.forEach((node, i) => {
      const angle = (2 * Math.PI * i / count) - Math.PI / 2;
      const nx = cx + radius * Math.cos(angle);
      const ny = cy + radius * Math.sin(angle);

      const isE = node.type === 'explicit';
      const col = isE ? colorE : colorI;
      const marker = isE ? 'url(#aE)' : 'url(#aI)';
      const dash = isE ? '' : ' stroke-dasharray="6,4"';

      const dx = nx - cx, dy = ny - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const ux = dx/dist, uy = dy/dist;
      const sx = cx + ux * (cw/2 + 4), sy = cy + uy * (ch/2 + 4);
      const tw = Math.max(node.name.length * 7 + 20, 90), th = 32;
      const ex = nx - ux * (tw/2 + 4), ey = ny - uy * (th/2 + 4);

      if (node.dir === 'out') {
        svg += '<line x1="' + sx + '" y1="' + sy + '" x2="' + ex + '" y2="' + ey + '" stroke="' + col + '" stroke-width="1.5"' + dash + ' marker-end="' + marker + '" opacity="0.7"/>';
      } else {
        svg += '<line x1="' + ex + '" y1="' + ey + '" x2="' + sx + '" y2="' + sy + '" stroke="' + col + '" stroke-width="1.5"' + dash + ' marker-end="' + marker + '" opacity="0.7"/>';
      }

      // Node
      svg += '<rect x="' + (nx - tw/2) + '" y="' + (ny - th/2) + '" width="' + tw + '" height="' + th + '" rx="8" fill="' + nodeFill + '" stroke="' + col + '" stroke-width="1.2" style="cursor:pointer" onclick="showTable(\'' + node.name + '\')"/>';
      svg += '<text x="' + nx + '" y="' + (ny + 4) + '" text-anchor="middle" fill="' + col + '" font-size="10" font-weight="600" style="cursor:pointer" onclick="showTable(\'' + node.name + '\')">' + node.name + '</text>';

      // Edge label
      const mx = (sx + ex) / 2, my = (sy + ey) / 2;
      svg += '<text x="' + mx + '" y="' + (my - 5) + '" text-anchor="middle" fill="' + textMuted + '" font-size="8">' + node.col + '</text>';
    });
  }

  // Legend
  const ly = H - 40;
  svg += '<rect x="12" y="' + ly + '" width="14" height="14" rx="3" fill="none" stroke="' + colorE + '" stroke-width="2"/>';
  svg += '<text x="32" y="' + (ly + 11) + '" fill="' + colorE + '" font-size="11" font-weight="600">Explicit FK</text>';
  svg += '<rect x="130" y="' + ly + '" width="14" height="14" rx="3" fill="none" stroke="' + colorI + '" stroke-width="2" stroke-dasharray="3,2"/>';
  svg += '<text x="150" y="' + (ly + 11) + '" fill="' + colorI + '" font-size="11" font-weight="600">Implied</text>';

  svg += '</svg>';
  canvas.innerHTML = svg;
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').blur();
  }
});
</script>
</body>
</html>
